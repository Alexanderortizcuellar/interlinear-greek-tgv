<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interlinear Greek-English Bible</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* A subtle highlight animation for when a verse is selected */
        @keyframes highlight {
            0% { background-color: #fef08a; } /* Tailwind yellow-200 */
            100% { background-color: transparent; }
        }
        .highlight-verse {
            animation: highlight 2s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BASE_URL = "https://alexanderortizcuellar.github.io/interlinear-greek-tgv/tgv";

        function App() {
            // State
            const [books, setBooks] = useState({});
            const [selectedBook, setSelectedBook] = useState("43"); // Default to John based on your example
            const [selectedChapter, setSelectedChapter] = useState(1);
            const [selectedVerse, setSelectedVerse] = useState("");
            
            const [chapterData, setChapterData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            // Fetch list of books on initial load
            useEffect(() => {
                fetch(`${BASE_URL}/books.json`)
                    .then(res => res.json())
                    .then(data => setBooks(data))
                    .catch(err => console.error("Error fetching books:", err));
            }, []);

            // Fetch chapter data when book or chapter changes
            useEffect(() => {
                if (!selectedBook || !selectedChapter) return;

                setIsLoading(true);
                setError(null);
                setChapterData(null); // Clear previous data
                setSelectedVerse(""); // Reset verse selection

                fetch(`${BASE_URL}/${selectedBook}/${selectedChapter}.json`)
                    .then(res => {
                        if (!res.ok) throw new Error("Chapter not found");
                        return res.json();
                    })
                    .then(data => {
                        setChapterData(data);
                        setIsLoading(false);
                    })
                    .catch(err => {
                        setError(err.message);
                        setIsLoading(false);
                    });
            }, [selectedBook, selectedChapter]);

            // Handle jumping to a specific verse
            const handleVerseChange = (e) => {
                const verseStr = e.target.value;
                setSelectedVerse(verseStr);
                
                if (verseStr) {
                    const verseElement = document.getElementById(`verse-${verseStr}`);
                    if (verseElement) {
                        // Scroll the verse into the center of the view
                        verseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // Briefly re-trigger highlight animation
                        verseElement.classList.remove('highlight-verse');
                        void verseElement.offsetWidth; // Trigger reflow
                        verseElement.classList.add('highlight-verse');
                    }
                }
            };

            // Helper to get verses mapped and sorted correctly
            const getVerses = () => {
                if (!chapterData) return [];
                return Object.keys(chapterData)
                    .filter(key => !isNaN(key)) // Filter out "book", "chapter", "verbs", etc.
                    .sort((a, b) => parseInt(a) - parseInt(b)); // Sort numerically
            };

            const versesList = getVerses();

            return (
                <div class="flex h-screen overflow-hidden">
                    {/* Main Content Area */}
                    <div class="flex-1 flex flex-col h-full bg-white shadow-lg z-10 overflow-hidden">
                        
                        {/* Top Navigation Bar */}
                        <header class="bg-blue-800 text-white p-4 flex flex-wrap gap-4 items-center shadow-md">
                            <h1 class="text-xl font-bold mr-4">TGV Interlinear</h1>
                            
                            {/* Book Selector */}
                            <select 
                                class="bg-blue-700 text-white border border-blue-600 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                                value={selectedBook}
                                onChange={(e) => {
                                    setSelectedBook(e.target.value);
                                    setSelectedChapter(1); // Reset to chapter 1 on new book
                                }}
                            >
                                {Object.entries(books).map(([id, info]) => (
                                    <option key={id} value={id}>{info.name}</option>
                                ))}
                            </select>

                            {/* Chapter Selector */}
                            <select 
                                class="bg-blue-700 text-white border border-blue-600 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                                value={selectedChapter}
                                onChange={(e) => setSelectedChapter(parseInt(e.target.value))}
                                disabled={!books[selectedBook]}
                            >
                                {books[selectedBook] && Array.from({ length: books[selectedBook].chapters }, (_, i) => i + 1).map(chapNum => (
                                    <option key={chapNum} value={chapNum}>Chapter {chapNum}</option>
                                ))}
                            </select>

                            {/* Verse Selector (Jump to) */}
                            <select 
                                class="bg-blue-700 text-white border border-blue-600 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                                value={selectedVerse}
                                onChange={handleVerseChange}
                                disabled={versesList.length === 0}
                            >
                                <option value="">Jump to Verse...</option>
                                {versesList.map(v => (
                                    <option key={v} value={v}>Verse {v}</option>
                                ))}
                            </select>
                        </header>

                        {/* Reader Area */}
                        <main class="flex-1 overflow-y-auto p-6 lg:p-12">
                            {isLoading && <p class="text-center text-gray-500 mt-10">Loading chapter...</p>}
                            {error && <p class="text-center text-red-500 mt-10">Error: {error}</p>}
                            
                            {!isLoading && chapterData && (
                                <div class="max-w-4xl mx-auto">
                                    <h2 class="text-3xl font-bold text-gray-800 mb-8 border-b pb-4">
                                        {chapterData.book} {chapterData.chapter}
                                    </h2>
                                    
                                    <div class="space-y-6">
                                        {versesList.map(verseNum => {
                                            const verseData = chapterData[verseNum];
                                            return (
                                                <div 
                                                    id={`verse-${verseNum}`} 
                                                    key={verseNum} 
                                                    class="flex items-start rounded p-2 transition-colors duration-300"
                                                >
                                                    {/* Verse Number */}
                                                    <span class="text-blue-600 font-bold mr-4 mt-1 min-w-[1.5rem] select-none">
                                                        {verseNum}
                                                    </span>
                                                    
                                                    {/* Interlinear Words Container */}
                                                    <div class="flex flex-wrap items-end gap-x-2 gap-y-4">
                                                        {verseData.map((wordPair, index) => (
                                                            <div key={index} class="flex flex-col items-center">
                                                                {/* Greek Text */}
                                                                <span class="text-gray-900 font-medium text-lg leading-tight">
                                                                    {wordPair[0]}
                                                                </span>
                                                                {/* English Text */}
                                                                <span class="text-gray-500 text-xs mt-1 text-center">
                                                                    {wordPair[1]}
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Sidebar (Future Vocabulary features) */}
                    <aside class="w-80 bg-gray-100 border-l border-gray-200 hidden md:flex flex-col">
                        <div class="p-4 bg-gray-200 border-b border-gray-300 font-bold text-gray-700">
                            Chapter Tools
                        </div>
                        <div class="p-6 flex-1 overflow-y-auto text-sm text-gray-600">
                            <p class="mb-4">This sidebar will eventually contain parsed vocabulary lists.</p>
                            
                            <div class="border rounded-md bg-white p-3 shadow-sm mb-4 opacity-50">
                                <h3 class="font-bold text-gray-800 border-b pb-1 mb-2">Verbs (Coming Soon)</h3>
                                <ul class="list-disc pl-5">
                                    <li>Future data here...</li>
                                </ul>
                            </div>

                            <div class="border rounded-md bg-white p-3 shadow-sm opacity-50">
                                <h3 class="font-bold text-gray-800 border-b pb-1 mb-2">Adjectives (Coming Soon)</h3>
                                <ul class="list-disc pl-5">
                                    <li>Future data here...</li>
                                </ul>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
